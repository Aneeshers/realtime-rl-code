name: sokoban
registered_version: Sokoban-v0

network:
    channels: [256,256,512,512]
    policy_layers: [64, 64]
    value_layers: [128, 128]

training:
    num_epochs: 1000
    num_learner_steps_per_epoch: 500
    n_steps: 20
    total_batch_size: 64

evaluation:
    eval_total_batch_size: 64
    greedy_eval_total_batch_size: 64 

a2c:
    normalize_advantage: True
    discount_factor: 0.97
    bootstrapping_factor: 0.95
    l_pg: 1.0
    l_td: 1.0
    l_en: 0.01
    learning_rate: 3e-4

az:
    num_simulations: 32
    gumbel_scale: 1.0
    discount_factor: 0.99
    learning_rate: 3e-4
    num_channels: 128
    num_blocks: 6
    time_embed_dim: 32
    resnet_v2: true