name: pac_man_k_t
registered_version: PacManKT-v1

network:
    num_channels: [4,4,1]
    policy_layers: [64]
    value_layers: [128]

training:
    num_epochs: 3000
    num_learner_steps_per_epoch: 50
    n_steps: 30
    total_batch_size: 128

evaluation:
    eval_total_batch_size: 100
    greedy_eval_total_batch_size: 100

a2c:
    normalize_advantage: False
    discount_factor: 0.99
    bootstrapping_factor: 0.95
    l_pg: 1.0
    l_td: 1.0
    l_en: 0.01
    learning_rate: 3e-4

az:
    num_simulations: 32
    gumbel_scale: 1.0
    discount_factor: 0.99
    learning_rate: 3e-4
    num_channels: 128
    num_blocks: 6
    time_embed_dim: 32
    action_delay: 1     # K=1 → no delay. Set to K for K-step policy-guided delay.
                        # Unlike pac_man (noops), delay steps use argmax(masked_policy_logits).
