name: snake_k_t
registered_version: SnakeKT-v1

training:
    num_epochs: 500
    num_learner_steps_per_epoch: 150
    n_steps: 50
    total_batch_size: 128

evaluation:
    eval_total_batch_size: 256
    greedy_eval_total_batch_size: 256

az:
    num_simulations: 16
    gumbel_scale: 1.0
    discount_factor: 0.997
    learning_rate: 3e-4
    num_channels: 128
    num_blocks: 6
    time_embed_dim: 32
    action_delay: 1     # K=1 → no delay. Set to K for K-step policy-guided delay.
                        # Unlike plain Snake (noop), delay steps use argmax(masked_policy_logits).
